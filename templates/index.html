<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1">
    <title>Qartie</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #6366f1;
            --bg: #0f0f23;
            --surface: #1a1a2e;
            --surface-hover: #252542;
            --text: #ffffff;
            --text-secondary: #a0a0b0;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 600px; margin: 0 auto; }

        h1 {
            font-size: 2rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-secondary {
            background: var(--surface);
            padding: 8px 16px;
            font-size: 14px;
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 13px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 100;
            overflow-y: auto;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--surface);
            padding: 24px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 { margin-bottom: 20px; font-size: 1.25rem; }

        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .emoji-btn {
            padding: 12px;
            font-size: 24px;
            background: var(--bg);
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .emoji-btn.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.2);
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .color-btn {
            width: 100%;
            aspect-ratio: 1;
            border: 3px solid transparent;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-btn.selected {
            border-color: white;
            transform: scale(1.1);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .modal-actions .btn { flex: 1; }

        /* Lists */
        .lists-grid {
            display: grid;
            gap: 16px;
            margin-top: 20px;
        }

        .list-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid var(--list-color, var(--primary));
            position: relative;
        }

        .list-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .list-actions {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .list-card:hover .list-actions {
            opacity: 1;
        }

        /* Mobile: always visible */
        @media (hover: none) and (pointer: coarse) {
            .list-card .list-actions {
                opacity: 1;
            }
        }

        .action-btn {
            background: var(--bg);
            border: none;
            color: var(--text);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: var(--surface-hover);
        }

        .list-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            padding-right: 80px;
        }

        .list-emoji {
            font-size: 32px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }

        .list-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .list-meta {
            color: var(--text-secondary);
            font-size: 13px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .deleted-badge {
            background: var(--danger);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        /* List Detail View */
        .list-detail {
            display: none;
        }

        .list-detail.active { display: block; }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }

        .detail-title-section {
            flex: 1;
            min-width: 200px;
        }

        .detail-title {
            font-size: 1.5rem;
            margin-bottom: 4px;
        }

        .detail-meta {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .detail-actions {
            display: flex;
            gap: 8px;
        }

        .add-item-form {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .add-item-form input[type="text"] {
            flex: 1;
            min-width: 150px;
        }

        .items-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item-card {
            background: var(--surface);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: opacity 0.2s;
        }

        .item-card.deleted {
            opacity: 0.5;
        }

        .item-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .item-checkbox.checked {
            background: var(--success);
            border-color: var(--success);
        }

        .item-checkbox.checked::after {
            content: 'вЬУ';
            color: white;
            font-size: 14px;
        }

        .item-content { flex: 1; }

        .item-text {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .item-text.completed {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .item-note {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .item-actions {
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .item-card:hover .item-actions {
            opacity: 1;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* History View */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .history-item {
            background: var(--bg);
            padding: 16px;
            border-radius: 12px;
            border-left: 3px solid var(--primary);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .history-action {
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .history-action.delete {
            background: var(--danger);
        }

        .history-content {
            font-size: 14px;
        }

        .history-content .label {
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 4px;
        }

        .show-deleted {
            margin-top: 16px;
            text-align: center;
        }

        .toggle-deleted {
            background: none;
            border: 1px solid var(--text-secondary);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .toggle-deleted.active {
            border-color: var(--danger);
            color: var(--danger);
        }
    </style>
</head>
<body>
    <!-- Templates -->
    <template id="list-card-template">
        <div class="list-card">
            <div class="list-actions">
                <button class="action-btn edit-btn" title="Edit">вЬПпЄП</button>
                <button class="action-btn history-btn" title="History">рЯУЬ</button>
                <button class="action-btn delete-btn" title="Delete">рЯЧСпЄП</button>
            </div>
            <div class="list-header">
                <span class="list-emoji"></span>
                <div>
                    <div class="list-title"></div>
                    <div class="list-meta"></div>
                </div>
            </div>
        </div>
    </template>

    <template id="item-card-template">
        <div class="item-card">
            <div class="item-checkbox"></div>
            <div class="item-content">
                <div class="item-text"></div>
                <div class="item-note"></div>
            </div>
            <div class="item-actions">
                <button class="action-btn edit-btn" title="Edit">вЬПпЄП</button>
                <button class="action-btn history-btn" title="History">рЯУЬ</button>
                <button class="action-btn delete-btn" title="Delete">рЯЧСпЄП</button>
            </div>
        </div>
    </template>

    <template id="history-item-template">
        <div class="history-item">
            <div class="history-header">
                <span class="history-date"></span>
                <span class="history-action"></span>
            </div>
            <div class="history-content"></div>
        </div>
    </template>

    <div class="container">
        <!-- Main View -->
        <div id="mainView">
            <h1>рЯУЛ Qartie <button class="btn" onclick="openListModal()">+ New List</button></h1>
            <div id="listsContainer" class="lists-grid"></div>
            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-state-icon">рЯУЭ</div>
                <p>No lists yet. Create your first list!</p>
            </div>
            <div class="show-deleted">
                <button class="toggle-deleted" id="showDeletedBtn" onclick="toggleShowDeleted()">
                    Show deleted lists
                </button>
            </div>
        </div>

        <!-- List Detail View -->
        <div id="listDetail" class="list-detail">
            <div class="detail-header">
                <button class="back-btn" onclick="showMainView()">вЖР</button>
                <div class="detail-title-section">
                    <span id="detailEmoji" class="list-emoji"></span>
                    <h2 id="detailTitle" class="detail-title"></h2>
                    <div class="detail-meta" id="detailMeta"></div>
                </div>
                <div class="detail-actions">
                    <button class="btn btn-secondary btn-small" onclick="openEditListModal()">Edit</button>
                    <button class="btn btn-secondary btn-small" onclick="openListHistory()">History</button>
                    <button class="btn btn-danger btn-small" onclick="deleteCurrentList()">Delete</button>
                </div>
            </div>

            <div class="add-item-form">
                <input type="text" id="itemText" placeholder="Add new item..." onkeypress="handleItemKeypress(event)">
                <input type="text" id="itemNote" placeholder="Note (optional)" onkeypress="handleItemKeypress(event)">
                <button class="btn" onclick="addItem()">Add</button>
            </div>

            <div id="itemsContainer" class="items-list"></div>

            <div class="show-deleted" style="margin-top: 20px;">
                <button class="toggle-deleted" id="showDeletedItemsBtn" onclick="toggleShowDeletedItems()">
                    Show deleted items
                </button>
            </div>
        </div>
    </div>

    <!-- Create/Edit List Modal -->
    <div id="listModal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h2 id="listModalTitle">Create New List</h2>

            <div class="form-group">
                <label>Title</label>
                <input type="text" id="listTitle" placeholder="e.g., Shopping, TODOs...">
            </div>

            <div class="form-group">
                <label>Icon</label>
                <div class="emoji-grid" id="emojiGrid"></div>
            </div>

            <div class="form-group">
                <label>Color Theme</label>
                <div class="color-grid" id="colorGrid"></div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeListModal()">Cancel</button>
                <button class="btn" onclick="saveList()">Save</button>
            </div>
        </div>
    </div>

    <!-- Edit Item Modal -->
    <div id="itemModal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h2>Edit Item</h2>

            <div class="form-group">
                <label>Text</label>
                <input type="text" id="editItemText">
            </div>

            <div class="form-group">
                <label>Note (optional)</label>
                <textarea id="editItemNote"></textarea>
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeItemModal()">Cancel</button>
                <button class="btn btn-danger" onclick="deleteEditingItem()">Delete</button>
                <button class="btn" onclick="saveItem()">Save</button>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div id="historyModal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
        <div class="modal" onclick="event.stopPropagation()" style="max-width: 500px;">
            <h2 id="historyTitle">Version History</h2>
            <div id="historyContent" class="history-list"></div>
            <div class="modal-actions" style="margin-top: 16px;">
                <button class="btn btn-secondary" onclick="closeHistoryModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        // IndexedDB Setup
        const DB_NAME = 'QartieDB';
        const DB_VERSION = 2;
        let db;
        let currentListId = null;
        let editingItemId = null;
        let editingListId = null;
        let showDeleted = false;
        let showDeletedItems = false;

        const EMOJIS = ['рЯУЭ', 'рЯЫТ', 'вЬЕ', 'рЯОѓ', 'рЯТ°', 'рЯУЪ', 'рЯТЉ', 'рЯП†', 'рЯО®', 'рЯФІ', 'рЯТК', 'рЯТ∞', 'рЯОБ', 'рЯУЕ', 'вЬИпЄП', 'рЯНљпЄП'];
        const COLORS = ['#6366f1', '#ec4899', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ef4444', '#14b8a6', '#f97316', '#64748b'];

        document.addEventListener('DOMContentLoaded', () => {
            initDB();
            renderEmojiGrid();
            renderColorGrid();
        });

        function initDB() {
            const request = indexedDB.open(DB_NAME, DB_VERSION);

            request.onerror = () => console.error('Failed to open DB');
            request.onsuccess = (e) => {
                db = e.target.result;
                loadLists();
            };

            request.onupgradeneeded = (e) => {
                const database = e.target.result;

                if (!database.objectStoreNames.contains('lists')) {
                    const listStore = database.createObjectStore('lists', { keyPath: 'id', autoIncrement: true });
                    listStore.createIndex('created', 'created', { unique: false });
                    listStore.createIndex('listGroupId', 'listGroupId', { unique: false });
                    listStore.createIndex('deleted', 'deleted', { unique: false });
                }

                if (!database.objectStoreNames.contains('items')) {
                    const itemStore = database.createObjectStore('items', { keyPath: 'id', autoIncrement: true });
                    itemStore.createIndex('listGroupId', 'listGroupId', { unique: false });
                    itemStore.createIndex('itemGroupId', 'itemGroupId', { unique: false });
                    itemStore.createIndex('created', 'created', { unique: false });
                    itemStore.createIndex('deleted', 'deleted', { unique: false });
                }
            };
        }

        // IndexedDB Infrastructure
        function withTransaction(storeNames, mode, operations) {
            try {
                const tx = db.transaction(storeNames, mode);
                tx.onerror = (e) => console.error('Transaction error:', e.target.error);
                return operations(tx);
            } catch (err) {
                console.error('Failed to create transaction:', err);
                throw err;
            }
        }

        function withCursor(storeName, indexName, keyRange, direction, onSuccess, onError = (e) => console.error('Cursor error:', e.target.error)) {
            return withTransaction([storeName], 'readonly', (tx) => {
                const store = tx.objectStore(storeName);
                const index = store.index(indexName);
                const request = index.openCursor(keyRange, direction);
                request.onsuccess = onSuccess;
                request.onerror = onError;
                return request;
            });
        }

        function withGetAll(storeName, indexName, key, onSuccess, onError = (e) => console.error('GetAll error:', e.target.error)) {
            return withTransaction([storeName], 'readonly', (tx) => {
                const store = tx.objectStore(storeName);
                const index = store.index(indexName);
                const request = index.getAll(key);
                request.onsuccess = onSuccess;
                request.onerror = onError;
                return request;
            });
        }

        function withGet(storeName, id, onSuccess, onError = (e) => console.error('Get error:', e.target.error)) {
            return withTransaction([storeName], 'readonly', (tx) => {
                const store = tx.objectStore(storeName);
                const request = store.get(id);
                request.onsuccess = onSuccess;
                request.onerror = onError;
                return request;
            });
        }

        function withAdd(storeName, data, onSuccess, onError = (e) => console.error('Add error:', e.target.error)) {
            return withTransaction([storeName], 'readwrite', (tx) => {
                const store = tx.objectStore(storeName);
                const request = store.add(data);
                request.onsuccess = onSuccess;
                request.onerror = onError;
                return request;
            });
        }

        // Get latest version by group ID
        function getLatestByGroupId(storeName, groupIdIndex, groupId, onSuccess, onError) {
            return withCursor(storeName, groupIdIndex, groupId, 'prev', (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    onSuccess(cursor.value);
                } else {
                    onSuccess(null);
                }
            }, onError);
        }

        // Template-based DOM Creation
        function createListCard(list) {
            const template = document.getElementById('list-card-template');
            const clone = template.content.cloneNode(true);
            const card = clone.querySelector('.list-card');

            card.style.setProperty('--list-color', list.deleted ? list.color + '66' : list.color);
            if (list.deleted) card.classList.add('deleted');

            const emoji = clone.querySelector('.list-emoji');
            emoji.textContent = list.emoji;

            const title = clone.querySelector('.list-title');
            title.innerHTML = escapeHtml(list.title) + (list.deleted ? ' <span class="deleted-badge">DELETED</span>' : '');

            const meta = clone.querySelector('.list-meta');
            meta.innerHTML = `
                <span>Created ${new Date(list.created).toLocaleDateString()}</span>
                <span>вАҐ</span>
                <span>${list.color}</span>
            `;

            const editBtn = clone.querySelector('.edit-btn');
            const historyBtn = clone.querySelector('.history-btn');
            const deleteBtn = clone.querySelector('.delete-btn');

            editBtn.onclick = (e) => {
                e.stopPropagation();
                openEditListFromCard(list.listGroupId);
            };

            historyBtn.onclick = (e) => {
                e.stopPropagation();
                openListHistoryFromCard(list.listGroupId);
            };

            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                deleteList(list.listGroupId);
            };

            if (!list.deleted) {
                card.onclick = () => openList(list.listGroupId);
            } else {
                card.style.cursor = 'default';
            }

            return card;
        }

        function createItemCard(item) {
            const template = document.getElementById('item-card-template');
            const clone = template.content.cloneNode(true);
            const card = clone.querySelector('.item-card');

            if (item.deleted) card.classList.add('deleted');

            const checkbox = clone.querySelector('.item-checkbox');
            if (item.completed) checkbox.classList.add('checked');

            const text = clone.querySelector('.item-text');
            text.textContent = item.text;
            if (item.completed) text.classList.add('completed');

            const note = clone.querySelector('.item-note');
            note.textContent = item.note || '';
            if (!item.note) note.style.display = 'none';

            const editBtn = clone.querySelector('.edit-btn');
            const historyBtn = clone.querySelector('.history-btn');
            const deleteBtn = clone.querySelector('.delete-btn');

            editBtn.onclick = (e) => {
                e.stopPropagation();
                openEditItemModal(item.id);
            };

            historyBtn.onclick = (e) => {
                e.stopPropagation();
                openItemHistory(item.itemGroupId);
            };

            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                softDeleteItem(item.id);
            };

            if (!item.deleted) {
                card.onclick = () => toggleItemComplete(item.id);
            } else {
                card.style.cursor = 'default';
            }

            return card;
        }

        function createHistoryItem(version, type, isFirst) {
            const template = document.getElementById('history-item-template');
            const clone = template.content.cloneNode(true);
            const item = clone.querySelector('.history-item');

            if (version.deleted) {
                item.style.opacity = '0.6';
                item.style.borderLeftColor = 'var(--danger)';
            }

            const date = clone.querySelector('.history-date');
            date.textContent = new Date(version.created).toLocaleString();

            const action = clone.querySelector('.history-action');
            let actionText = 'EDITED';
            if (version.deleted) actionText = 'DELETED';
            else if (isFirst) actionText = 'CREATED';
            action.textContent = actionText;
            action.classList.toggle('delete', version.deleted);

            const content = clone.querySelector('.history-content');

            if (type === 'list') {
                content.innerHTML = `
                    <div class="label">Title</div>
                    <div style="font-size: 18px; margin-bottom: 8px;">
                        <span style="margin-right: 8px;">${version.emoji}</span>
                        ${escapeHtml(version.title)}
                    </div>
                    <div class="label">Color</div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <div style="width: 20px; height: 20px; background: ${version.color}; border-radius: 50%;"></div>
                        <span style="font-size: 13px; color: var(--text-secondary);">${version.color}</span>
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <div class="label">Text</div>
                    <div style="font-size: 16px; margin-bottom: 4px;">${escapeHtml(version.text)}</div>
                    ${version.note ? `<div class="label">Note</div><div style="color: var(--text-secondary);">${escapeHtml(version.note)}</div>` : ''}
                `;
            }

            return item;
        }

        // Utility Functions
        function renderEmojiGrid() {
            const grid = document.getElementById('emojiGrid');
            grid.innerHTML = '';
            EMOJIS.forEach((emoji, i) => {
                const btn = document.createElement('button');
                btn.className = 'emoji-btn' + (i === 0 ? ' selected' : '');
                btn.textContent = emoji;
                btn.onclick = () => selectEmoji(btn, emoji);
                grid.appendChild(btn);
            });
        }

        function renderColorGrid() {
            const grid = document.getElementById('colorGrid');
            grid.innerHTML = '';
            COLORS.forEach((color, i) => {
                const btn = document.createElement('button');
                btn.className = 'color-btn' + (i === 0 ? ' selected' : '');
                btn.style.background = color;
                btn.onclick = () => selectColor(btn, color);
                grid.appendChild(btn);
            });
        }

        let selectedEmoji = EMOJIS[0];
        let selectedColor = COLORS[0];

        function selectEmoji(btn, emoji) {
            document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedEmoji = emoji;
        }

        function selectColor(btn, color) {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedColor = color;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Modal Controls
        function openListModal() {
            editingListId = null;
            document.getElementById('listModalTitle').textContent = 'Create New List';
            document.getElementById('listTitle').value = '';
            selectEmoji(document.querySelector('.emoji-btn'), EMOJIS[0]);
            selectColor(document.querySelector('.color-btn'), COLORS[0]);
            document.getElementById('listModal').classList.add('active');
            document.getElementById('listTitle').focus();
        }

        function openEditListModal() {
            if (!currentListId) return;

            getLatestByGroupId('lists', 'listGroupId', currentListId, (list) => {
                if (!list) return;

                editingListId = currentListId;
                document.getElementById('listModalTitle').textContent = 'Edit List';
                document.getElementById('listTitle').value = list.title;

                document.querySelectorAll('.emoji-btn').forEach(btn => {
                    btn.classList.toggle('selected', btn.textContent === list.emoji);
                });
                selectedEmoji = list.emoji;

                document.querySelectorAll('.color-btn').forEach(btn => {
                    btn.classList.toggle('selected', btn.style.background === list.color);
                });
                selectedColor = list.color;

                document.getElementById('listModal').classList.add('active');
            });
        }

        function closeListModal() {
            document.getElementById('listModal').classList.remove('active');
            editingListId = null;
        }

        function openItemModal(itemId) {
            editingItemId = itemId;
            withGet('items', itemId, (e) => {
                const item = e.target.result;
                document.getElementById('editItemText').value = item.text;
                document.getElementById('editItemNote').value = item.note || '';
                document.getElementById('itemModal').classList.add('active');
            });
        }

        function closeItemModal() {
            document.getElementById('itemModal').classList.remove('active');
            editingItemId = null;
        }

        function openListHistory() {
            if (!currentListId) return;
            showHistory('list', currentListId);
        }

        function openListHistoryFromCard(listGroupId) {
            showHistory('list', listGroupId);
        }

        function openItemHistory(itemGroupId) {
            showHistory('item', itemGroupId);
        }

        function showHistory(type, groupId) {
            const storeName = type === 'list' ? 'lists' : 'items';
            const indexName = type === 'list' ? 'listGroupId' : 'itemGroupId';

            withGetAll(storeName, indexName, groupId, (e) => {
                const versions = e.target.result.sort((a, b) => b.created - a.created);

                document.getElementById('historyTitle').textContent =
                    type === 'list' ? 'List Version History' : 'Item Version History';

                const content = document.getElementById('historyContent');

                if (versions.length === 0) {
                    content.innerHTML = '<div class="empty-state">No history found</div>';
                } else {
                    content.innerHTML = '';
                    versions.forEach((v, i) => {
                        content.appendChild(createHistoryItem(v, type, i === versions.length - 1));
                    });
                }

                document.getElementById('historyModal').classList.add('active');
            });
        }

        function closeHistoryModal() {
            document.getElementById('historyModal').classList.remove('active');
        }

        function closeModalOnOverlay(e) {
            if (e.target === e.currentTarget) {
                closeListModal();
                closeItemModal();
                closeHistoryModal();
            }
        }

        // List Operations
        function saveList() {
            const title = document.getElementById('listTitle').value.trim();
            if (!title) return alert('Please enter a title');

            const now = Date.now();
            const listGroupId = editingListId || crypto.randomUUID();

            const list = {
                listGroupId: listGroupId,
                title,
                emoji: selectedEmoji,
                color: selectedColor,
                created: now,
                deleted: false
            };

            withAdd('lists', list, () => {
                if (editingListId) {
                    closeListModal();
                    openList(listGroupId);
                } else {
                    closeListModal();
                    loadLists();
                }
            });
        }

        function deleteCurrentList() {
            if (!currentListId || !confirm('Delete this list? Items will be soft-deleted too.')) return;

            softDeleteListById(currentListId, () => showMainView());
        }

        function softDeleteListById(listGroupId, onComplete) {
            getLatestByGroupId('lists', 'listGroupId', listGroupId, (currentList) => {
                if (!currentList) return;

                const { id, ...listWithoutId } = currentList;
                const deletedList = {
                    ...listWithoutId,
                    created: Date.now(),
                    deleted: true
                };

                withAdd('lists', deletedList, () => {
                    // Soft-delete all items in this list
                    withGetAll('items', 'listGroupId', listGroupId, (e) => {
                        const items = e.target.result;
                        let pending = 0;

                        items.forEach(item => {
                            if (!item.deleted) {
                                pending++;
                                const { id: itemId, ...itemWithoutId } = item;
                                const deletedItem = {
                                    ...itemWithoutId,
                                    created: Date.now(),
                                    deleted: true
                                };

                                withAdd('items', deletedItem, () => {
                                    pending--;
                                    if (pending === 0 && onComplete) onComplete();
                                });
                            }
                        });

                        if (pending === 0 && onComplete) onComplete();
                    });
                });
            });
        }

        function deleteList(listGroupId) {
            if (!confirm('Delete this list?')) return;
            softDeleteListById(listGroupId, () => loadLists());
        }

        function loadLists() {
            withTransaction(['lists'], 'readonly', (tx) => {
                const store = tx.objectStore('lists');
                const request = store.getAll();

                request.onsuccess = (e) => {
                    const allLists = e.target.result;
                    const listMap = new Map();

                    allLists.forEach(list => {
                        const existing = listMap.get(list.listGroupId);
                        if (!existing || list.created > existing.created) {
                            listMap.set(list.listGroupId, list);
                        }
                    });

                    const lists = Array.from(listMap.values())
                        .filter(l => showDeleted ? true : !l.deleted)
                        .sort((a, b) => b.created - a.created);

                    const container = document.getElementById('listsContainer');
                    const emptyState = document.getElementById('emptyState');

                    if (lists.length === 0) {
                        container.innerHTML = '';
                        emptyState.style.display = 'block';
                        return;
                    }

                    emptyState.style.display = 'none';
                    container.innerHTML = '';
                    lists.forEach(list => container.appendChild(createListCard(list)));
                };

                request.onerror = (e) => console.error('Failed to load lists:', e.target.error);
            });
        }

        function openList(listGroupId) {
            currentListId = listGroupId;

            getLatestByGroupId('lists', 'listGroupId', listGroupId, (list) => {
                if (!list) return showMainView();

                document.getElementById('detailEmoji').textContent = list.emoji;
                document.getElementById('detailTitle').textContent = list.title;
                document.getElementById('detailTitle').style.color = list.color;
                document.getElementById('detailMeta').innerHTML = `
                    Created: ${new Date(list.created).toLocaleString()}<br>
                    Last edited: ${new Date(list.created).toLocaleString()}
                `;

                document.getElementById('mainView').style.display = 'none';
                document.getElementById('listDetail').classList.add('active');

                loadItems();
            });
        }

        function openEditListFromCard(listGroupId) {
            currentListId = listGroupId;
            openEditListModal();
        }

        function showMainView() {
            currentListId = null;
            document.getElementById('mainView').style.display = 'block';
            document.getElementById('listDetail').classList.remove('active');
            loadLists();
        }

        function toggleShowDeleted() {
            showDeleted = !showDeleted;
            document.getElementById('showDeletedBtn').textContent =
                showDeleted ? 'Hide deleted lists' : 'Show deleted lists';
            document.getElementById('showDeletedBtn').classList.toggle('active', showDeleted);
            loadLists();
        }

        // Item Operations
        function loadItems() {
            withGetAll('items', 'listGroupId', currentListId, (e) => {
                const allItems = e.target.result;
                const itemMap = new Map();

                allItems.forEach(item => {
                    const groupId = item.itemGroupId || item.id;
                    const existing = itemMap.get(groupId);
                    if (!existing || item.created > existing.created) {
                        itemMap.set(groupId, item);
                    }
                });

                const items = Array.from(itemMap.values())
                    .filter(i => showDeletedItems ? true : !i.deleted)
                    .sort((a, b) => b.created - a.created);

                const container = document.getElementById('itemsContainer');

                if (items.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>No items yet. Add your first item!</p></div>';
                    return;
                }

                container.innerHTML = '';
                items.forEach(item => container.appendChild(createItemCard(item)));
            });
        }

        function addItem() {
            const text = document.getElementById('itemText').value.trim();
            const note = document.getElementById('itemNote').value.trim();

            if (!text) return;

            const now = Date.now();
            const itemGroupId = crypto.randomUUID();

            const item = {
                listGroupId: currentListId,
                itemGroupId: itemGroupId,
                text,
                note,
                completed: false,
                created: now,
                deleted: false
            };

            withAdd('items', item, () => {
                document.getElementById('itemText').value = '';
                document.getElementById('itemNote').value = '';
                document.getElementById('itemText').focus();
                loadItems();
            });
        }

        function handleItemKeypress(e) {
            if (e.key === 'Enter') addItem();
        }

        function toggleItemComplete(itemId) {
            withGet('items', itemId, (e) => {
                const item = e.target.result;
                const { id, ...itemWithoutId } = item;
                const updatedItem = {
                    ...itemWithoutId,
                    completed: !item.completed,
                    created: Date.now()
                };

                withAdd('items', updatedItem, () => loadItems());
            });
        }

        function openEditItemModal(itemId) {
            editingItemId = itemId;
            withGet('items', itemId, (e) => {
                const item = e.target.result;
                document.getElementById('editItemText').value = item.text;
                document.getElementById('editItemNote').value = item.note || '';
                document.getElementById('itemModal').classList.add('active');
            });
        }

        function saveItem() {
            if (!editingItemId) return;

            const text = document.getElementById('editItemText').value.trim();
            if (!text) return alert('Please enter item text');

            const note = document.getElementById('editItemNote').value.trim();

            withGet('items', editingItemId, (e) => {
                const currentItem = e.target.result;
                const { id, ...itemWithoutId } = currentItem;
                const updatedItem = {
                    ...itemWithoutId,
                    text,
                    note,
                    created: Date.now()
                };

                withAdd('items', updatedItem, () => {
                    closeItemModal();
                    loadItems();
                });
            });
        }

        function softDeleteItem(itemId, onComplete) {
            withGet('items', itemId, (e) => {
                const item = e.target.result;
                const { id, ...itemWithoutId } = item;
                const deletedItem = {
                    ...itemWithoutId,
                    created: Date.now(),
                    deleted: true
                };

                withAdd('items', deletedItem, () => {
                    if (onComplete) onComplete();
                    else loadItems();
                });
            });
        }

        function deleteEditingItem() {
            if (!editingItemId || !confirm('Delete this item?')) return;
            softDeleteItem(editingItemId, () => {
                closeItemModal();
                loadItems();
            });
        }

        function toggleShowDeletedItems() {
            showDeletedItems = !showDeletedItems;
            document.getElementById('showDeletedItemsBtn').textContent =
                showDeletedItems ? 'Hide deleted items' : 'Show deleted items';
            document.getElementById('showDeletedItemsBtn').classList.toggle('active', showDeletedItems);
            loadItems();
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
