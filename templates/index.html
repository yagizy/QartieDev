<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1">
    <title>Qartie</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- QR Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #6366f1;
            --bg: #0f0f23;
            --surface: #1a1a2e;
            --surface-hover: #252542;
            --text: #ffffff;
            --text-secondary: #a0a0b0;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 600px; margin: 0 auto; }

        h1 {
            font-size: 2rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-secondary {
            background: var(--surface);
            padding: 8px 16px;
            font-size: 14px;
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 13px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 100;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--surface);
            padding: 24px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 { margin-bottom: 20px; font-size: 1.25rem; }

        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .emoji-btn {
            padding: 12px;
            font-size: 24px;
            background: var(--bg);
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .emoji-btn.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.2);
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .color-btn {
            width: 100%;
            aspect-ratio: 1;
            border: 3px solid transparent;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-btn.selected {
            border-color: white;
            transform: scale(1.1);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .modal-actions .btn { flex: 1; }

        /* Lists */
        .lists-grid {
            display: grid;
            gap: 16px;
            margin-top: 20px;
        }

        .list-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid var(--list-color, var(--primary));
            position: relative;
        }

        .list-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .list-actions {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .list-card:hover .list-actions {
            opacity: 1;
        }

        /* Mobile: always visible */
        @media (hover: none) and (pointer: coarse) {
            .list-card .list-actions {
                opacity: 1;
            }
        }

        .action-btn {
            background: var(--bg);
            border: none;
            color: var(--text);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: var(--surface-hover);
        }

        .list-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            padding-right: 80px;
        }

        .list-emoji {
            font-size: 32px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }

        .list-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .list-meta {
            color: var(--text-secondary);
            font-size: 13px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .deleted-badge {
            background: var(--danger);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        /* List Detail View */
        .list-detail {
            display: none;
        }

        .list-detail.active { display: block; }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }

        .detail-title-section {
            flex: 1;
            min-width: 200px;
        }

        .detail-title {
            font-size: 1.5rem;
            margin-bottom: 4px;
        }

        .detail-meta {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .detail-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .add-item-form {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .add-item-form input[type="text"] {
            flex: 1;
            min-width: 150px;
        }

        .items-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item-card {
            background: var(--surface);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: opacity 0.2s;
        }

        .item-card.deleted {
            opacity: 0.5;
        }

        .item-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .item-checkbox.checked {
            background: var(--success);
            border-color: var(--success);
        }

        .item-checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 14px;
        }

        .item-content { flex: 1; }

        .item-text {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .item-text.completed {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .item-note {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .item-actions {
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .item-card:hover .item-actions {
            opacity: 1;
        }

        /* Mobile: always visible */
        @media (hover: none) and (pointer: coarse) {
            .item-card .item-actions {
                opacity: 1;
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* History View */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .history-item {
            background: var(--bg);
            padding: 16px;
            border-radius: 12px;
            border-left: 3px solid var(--primary);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .history-action {
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .history-action.delete {
            background: var(--danger);
        }

        .history-content {
            font-size: 14px;
        }

        .history-content .label {
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 4px;
        }

        .show-deleted {
            margin-top: 16px;
            text-align: center;
        }

        .toggle-deleted {
            background: none;
            border: 1px solid var(--text-secondary);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .toggle-deleted.active {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* QR Export Styles */
        .qr-preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }

        .qr-card-canvas {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .qr-info {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Import Styles */
        .import-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        .import-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: var(--bg);
            border: 2px dashed var(--text-secondary);
            border-radius: 12px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }

        .import-btn:hover {
            border-color: var(--primary);
            background: var(--surface-hover);
        }

        .import-icon {
            font-size: 24px;
        }

        .import-text {
            flex: 1;
        }

        .import-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .import-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        #qrFileInput {
            display: none;
        }

        .import-preview {
            margin-top: 20px;
            text-align: center;
        }

        .import-preview img {
            max-width: 100%;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .import-status {
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 14px;
        }

        .import-status.success {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .import-status.error {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }
    </style>
</head>
<body>
    <!-- Templates -->
    <template id="list-card-template">
        <div class="list-card">
            <div class="list-actions">
                <button class="action-btn edit-btn" title="Edit">✏️</button>
                <button class="action-btn history-btn" title="History">📜</button>
                <button class="action-btn export-btn" title="Export QR">📤</button>
                <button class="action-btn delete-btn" title="Delete">🗑️</button>
            </div>
            <div class="list-header">
                <span class="list-emoji"></span>
                <div>
                    <div class="list-title"></div>
                    <div class="list-meta"></div>
                </div>
            </div>
        </div>
    </template>

    <template id="item-card-template">
        <div class="item-card">
            <div class="item-checkbox"></div>
            <div class="item-content">
                <div class="item-text"></div>
                <div class="item-note"></div>
            </div>
            <div class="item-actions">
                <button class="action-btn edit-btn" title="Edit">✏️</button>
                <button class="action-btn history-btn" title="History">📜</button>
                <button class="action-btn delete-btn" title="Delete">🗑️</button>
            </div>
        </div>
    </template>

    <template id="history-item-template">
        <div class="history-item">
            <div class="history-header">
                <span class="history-date"></span>
                <span class="history-action"></span>
            </div>
            <div class="history-content"></div>
        </div>
    </template>

    <div class="container">
        <!-- Main View -->
        <div id="mainView">
            <h1>📋 Qartie
                <button class="btn" onclick="openListModal()">+ New List</button>
                <button class="btn btn-secondary" onclick="openImportModal()">📥 Import</button>
            </h1>
            <div id="listsContainer" class="lists-grid"></div>
            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-state-icon">📝</div>
                <p>No lists yet. Create your first list!</p>
            </div>
            <div class="show-deleted">
                <button class="toggle-deleted" id="showDeletedBtn" onclick="toggleShowDeleted()">
                    Show deleted lists
                </button>
            </div>
        </div>

        <!-- List Detail View -->
        <div id="listDetail" class="list-detail">
            <div class="detail-header">
                <button class="back-btn" onclick="showMainView()">←</button>
                <div class="detail-title-section">
                    <span id="detailEmoji" class="list-emoji"></span>
                    <h2 id="detailTitle" class="detail-title"></h2>
                    <div class="detail-meta" id="detailMeta"></div>
                </div>
                <div class="detail-actions">
                    <button class="btn btn-secondary btn-small" onclick="openEditListModal()">Edit</button>
                    <button class="btn btn-secondary btn-small" onclick="openListHistory()">History</button>
                    <button class="btn btn-secondary btn-small" onclick="exportCurrentList()">📤 Export QR</button>
                    <button class="btn btn-danger btn-small" onclick="deleteCurrentList()">Delete</button>
                </div>
            </div>

            <div class="add-item-form">
                <input type="text" id="itemText" placeholder="Add new item..." onkeypress="handleItemKeypress(event)">
                <input type="text" id="itemNote" placeholder="Note (optional)" onkeypress="handleItemKeypress(event)">
                <button class="btn" onclick="addItem()">Add</button>
            </div>

            <div id="itemsContainer" class="items-list"></div>

            <div class="show-deleted" style="margin-top: 20px;">
                <button class="toggle-deleted" id="showDeletedItemsBtn" onclick="toggleShowDeletedItems()">
                    Show deleted items
                </button>
            </div>
        </div>
    </div>

    <!-- Create/Edit List Modal -->
    <div id="listModal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h2 id="listModalTitle">Create New List</h2>

            <div class="form-group">
                <label>Title</label>
                <input type="text" id="listTitle" placeholder="e.g., Shopping, TODOs...">
            </div>

            <div class="form-group">
                <label>Icon</label>
                <div class="emoji-grid" id="emojiGrid"></div>
            </div>

            <div class="form-group">
                <label>Color Theme</label>
                <div class="color-grid" id="colorGrid"></div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeListModal()">Cancel</button>
                <button class="btn" onclick="saveList()">Save</button>
            </div>
        </div>
    </div>

    <!-- Edit Item Modal -->
    <div id="itemModal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h2>Edit Item</h2>

            <div class="form-group">
                <label>Text</label>
                <input type="text" id="editItemText">
            </div>

            <div class="form-group">
                <label>Note (optional)</label>
                <textarea id="editItemNote"></textarea>
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeItemModal()">Cancel</button>
                <button class="btn btn-danger" onclick="deleteEditingItem()">Delete</button>
                <button class="btn" onclick="saveItem()">Save</button>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div id="historyModal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
        <div class="modal" onclick="event.stopPropagation()" style="max-width: 500px;">
            <h2 id="historyTitle">Version History</h2>
            <div id="historyContent" class="history-list"></div>
            <div class="modal-actions" style="margin-top: 16px;">
                <button class="btn btn-secondary" onclick="closeHistoryModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- QR Export Modal -->
    <div id="qrExportModal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
        <div class="modal" onclick="event.stopPropagation()" style="max-width: 450px;">
            <h2>Export List</h2>
            <p style="color: var(--text-secondary); margin-bottom: 16px; font-size: 14px;">
                Scan this QR code with another device to import the list.
            </p>

            <div class="qr-preview-container">
                <canvas id="qrCardCanvas" class="qr-card-canvas" width="600" height="800"></canvas>
                <div class="qr-info" id="qrInfo"></div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeQrExportModal()">Close</button>
                <button class="btn" onclick="downloadQrCard()">⬇️ Download</button>
                <button class="btn" onclick="shareQrCard()" id="shareBtn" style="display: none;">📤 Share</button>
            </div>
        </div>
    </div>

    <!-- Import Modal -->
    <div id="importModal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h2>Import List</h2>
            <p style="color: var(--text-secondary); margin-bottom: 16px; font-size: 14px;">
                Import a list from a QR code image.
            </p>

            <div class="import-options">
                <label class="import-btn" for="qrFileInput">
                    <span class="import-icon">🖼️</span>
                    <span class="import-text">
                        <div class="import-title">Choose from Gallery</div>
                        <div class="import-desc">Select a QR code image</div>
                    </span>
                </label>

                <input type="file" id="qrFileInput" accept="image/*" onchange="handleQrFileSelect(event)">
            </div>

            <div id="importPreview" class="import-preview" style="display: none;">
                <img id="importPreviewImg" src="" alt="Selected QR">
                <div id="importStatus" class="import-status"></div>
            </div>

            <div class="modal-actions" style="margin-top: 20px;">
                <button class="btn btn-secondary" onclick="closeImportModal()">Cancel</button>
                <button class="btn" id="confirmImportBtn" onclick="confirmImport()" style="display: none;">Import List</button>
            </div>
        </div>
    </div>

    <script>
        // IndexedDB Setup
        const DB_NAME = 'QartieDB';
        const DB_VERSION = 2;
        let db;
        let currentListId = null;
        let editingItemId = null;
        let editingListId = null;
        let showDeleted = false;
        let showDeletedItems = false;
        let pendingImportData = null;

        const EMOJIS = ['📝', '🛒', '✅', '🎯', '💡', '📚', '💼', '🏠', '🎨', '🔧', '💊', '💰', '🎁', '📅', '✈️', '🍽️'];
        const COLORS = ['#6366f1', '#ec4899', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ef4444', '#14b8a6', '#f97316', '#64748b'];

        document.addEventListener('DOMContentLoaded', () => {
            initDB();
            renderEmojiGrid();
            renderColorGrid();

            // Check if Web Share API is available
            if (navigator.share) {
                document.getElementById('shareBtn').style.display = 'block';
            }
        });

        function initDB() {
            const request = indexedDB.open(DB_NAME, DB_VERSION);

            request.onerror = () => console.error('Failed to open DB');
            request.onsuccess = (e) => {
                db = e.target.result;
                loadLists();
            };

            request.onupgradeneeded = (e) => {
                const database = e.target.result;

                if (!database.objectStoreNames.contains('lists')) {
                    const listStore = database.createObjectStore('lists', { keyPath: 'id', autoIncrement: true });
                    listStore.createIndex('created', 'created', { unique: false });
                    listStore.createIndex('listGroupId', 'listGroupId', { unique: false });
                    listStore.createIndex('deleted', 'deleted', { unique: false });
                }

                if (!database.objectStoreNames.contains('items')) {
                    const itemStore = database.createObjectStore('items', { keyPath: 'id', autoIncrement: true });
                    itemStore.createIndex('listGroupId', 'listGroupId', { unique: false });
                    itemStore.createIndex('itemGroupId', 'itemGroupId', { unique: false });
                    itemStore.createIndex('created', 'created', { unique: false });
                    itemStore.createIndex('deleted', 'deleted', { unique: false });
                }
            };
        }

        // IndexedDB Infrastructure
        function withTransaction(storeNames, mode, operations) {
            try {
                const tx = db.transaction(storeNames, mode);
                tx.onerror = (e) => console.error('Transaction error:', e.target.error);
                return operations(tx);
            } catch (err) {
                console.error('Failed to create transaction:', err);
                throw err;
            }
        }

        function withCursor(storeName, indexName, keyRange, direction, onSuccess, onError = (e) => console.error('Cursor error:', e.target.error)) {
            return withTransaction([storeName], 'readonly', (tx) => {
                const store = tx.objectStore(storeName);
                const index = store.index(indexName);
                const request = index.openCursor(keyRange, direction);
                request.onsuccess = onSuccess;
                request.onerror = onError;
                return request;
            });
        }

        function withGetAll(storeName, indexName, key, onSuccess, onError = (e) => console.error('GetAll error:', e.target.error)) {
            return withTransaction([storeName], 'readonly', (tx) => {
                const store = tx.objectStore(storeName);
                const index = store.index(indexName);
                const request = index.getAll(key);
                request.onsuccess = onSuccess;
                request.onerror = onError;
                return request;
            });
        }

        function withGet(storeName, id, onSuccess, onError = (e) => console.error('Get error:', e.target.error)) {
            return withTransaction([storeName], 'readonly', (tx) => {
                const store = tx.objectStore(storeName);
                const request = store.get(id);
                request.onsuccess = onSuccess;
                request.onerror = onError;
                return request;
            });
        }

        function withAdd(storeName, data, onSuccess, onError = (e) => console.error('Add error:', e.target.error)) {
            return withTransaction([storeName], 'readwrite', (tx) => {
                const store = tx.objectStore(storeName);
                const request = store.add(data);
                request.onsuccess = onSuccess;
                request.onerror = onError;
                return request;
            });
        }

        // Get latest version by group ID
        function getLatestByGroupId(storeName, groupIdIndex, groupId, onSuccess, onError) {
            return withCursor(storeName, groupIdIndex, groupId, 'prev', (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    onSuccess(cursor.value);
                } else {
                    onSuccess(null);
                }
            }, onError);
        }

        function exportListById(listGroupId) {
            getLatestByGroupId('lists', 'listGroupId', listGroupId, (list) => {
                if (!list || list.deleted) {
                    alert('Cannot export deleted list');
                    return;
                }

                withGetAll('items', 'listGroupId', listGroupId, (e) => {
                    const allItems = e.target.result;
                    const itemMap = new Map();

                    allItems.forEach(item => {
                        const groupId = item.itemGroupId || item.id;
                        const existing = itemMap.get(groupId);
                        if (!existing || item.created > existing.created) {
                            itemMap.set(groupId, item);
                        }
                    });

                    const items = Array.from(itemMap.values())
                        .filter(i => !i.deleted)
                        .map(i => ({
                            t: i.text,        // Short keys to save space
                            n: i.note || '',
                            c: i.completed ? 1 : 0
                        }));

                    // Compact payload with short keys
                    const payload = {
                        v: 1,
                        a: 'qartie',        // 'a' = app
                        t: 'l',             // 't' = type (list)
                        d: {                // 'd' = data
                            t: list.title,
                            e: list.emoji,
                            c: list.color,
                            i: items,
                            cr: list.created
                        }
                    };

                    const qrData = JSON.stringify(payload);
                    console.log('QR payload size:', qrData.length, 'bytes');

                    // Check size limit (version 40, ECC H = ~1273 bytes binary)
                    if (qrData.length > 1200) {
                        alert('List is too large for QR code. Try removing some items or shortening text.');
                        return;
                    }

                    generateQrCard(qrData, list, items.length);
                });
            });

        function generateQrCard(qrData, list, itemCount) {
            const canvas = document.getElementById('qrCardCanvas');
            const ctx = canvas.getContext('2d');
            const width = 600;
            const height = 800;

            // Clear canvas
            ctx.clearRect(0, 0, width, height);

            // Create gradient background
            const gradient = ctx.createLinearGradient(0, 0, width, height);
            const baseColor = list.color;
            gradient.addColorStop(0, baseColor);
            gradient.addColorStop(1, adjustBrightness(baseColor, -30));
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Add subtle pattern
            ctx.fillStyle = 'rgba(255,255,255,0.03)';
            for (let i = 0; i < width; i += 40) {
                for (let j = 0; j < height; j += 40) {
                    ctx.fillRect(i, j, 20, 20);
                }
            }

            // Draw emoji
            ctx.font = '80px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 20;
            ctx.fillText(list.emoji, width / 2, 120);
            ctx.shadowBlur = 0;

            // Draw title
            ctx.font = 'bold 42px -apple-system, BlinkMacSystemFont, sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(truncateText(ctx, list.title, 500), width / 2, 200);

            // UTF-8 encode the data manually before QR generation
            const encoder = new TextEncoder();
            const utf8Bytes = encoder.encode(qrData);

            // Calculate required version for byte length
            const typeNumber = getQrVersion(utf8Bytes.length);

            // Create QR with explicit byte mode using UTF-8 bytes
            const qr = qrcode(typeNumber, 'L');

            // Add ECI indicator for UTF-8 (value 26) then byte data
            // qrcode-generator\'s addData accepts mode as second param
            // But we need to pass raw bytes. The library doesn\'t support this directly,
            // so we use a workaround: create segments manually or use string with proper encoding

            // WORKAROUND: qrcode-generator doesn\'t support raw byte arrays well.
            // Instead, we encode as a string where each byte becomes a character
            // with code point 0-255. This preserves UTF-8 byte sequence in the QR.
            let byteString = '';
            for (let i = 0; i < utf8Bytes.length; i++) {
                byteString += String.fromCharCode(utf8Bytes[i]);
            }

            qr.addData(byteString, 'Byte');
            qr.make();

            // Draw QR code manually - cell by cell
            const qrSize = 280;
            const cellSize = qrSize / qr.getModuleCount();
            const qrX = (width - qrSize) / 2;
            const qrY = 260;

            // White rounded background for QR
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.roundRect(qrX - 10, qrY - 10, qrSize + 20, qrSize + 20, 20);
            ctx.fill();

            // Draw QR modules
            for (let row = 0; row < qr.getModuleCount(); row++) {
                for (let col = 0; col < qr.getModuleCount(); col++) {
                    if (qr.isDark(row, col)) {
                        ctx.fillStyle = '#000000';
                        ctx.fillRect(qrX + col * cellSize, qrY + row * cellSize, cellSize, cellSize);
                    }
                }
            }

            // Draw metadata
            ctx.font = '24px monospace';
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.textAlign = 'center';

            const dateStr = new Date().toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });

            ctx.fillText(`${itemCount} items • ${dateStr}`, width / 2, 600);
            ctx.fillText(`Version 1 • Plain Text`, width / 2, 635);

            // Draw footer
            ctx.font = '18px monospace';
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fillText('Scan with Qartie to import', width / 2, 740);

            // Convert to blob for sharing
            canvas.toBlob((blob) => {
                currentQrBlob = blob;
            }, 'image/png');

            // Show info
            document.getElementById('qrInfo').textContent =
                `${(utf8Bytes.length / 1024).toFixed(2)} KB • ${itemCount} items • QR v${typeNumber}`;

            document.getElementById('qrExportModal').classList.add('active');
        }

        // Calculate required QR version based on data length
        function getQrVersion(dataLength) {
            // Version capacity table for Binary data, ECC Level H
            // These are approximate safe limits
            const capacities = [
                0, 17, 32, 53, 78, 106, 134, 154, 192, 230,  // 1-9
                271, 321, 367, 425, 458, 520, 586, 644, 718, 792,  // 10-19
                858, 929, 1003, 1091, 1171, 1273, 1367, 1465, 1528, 1628,  // 20-29
                1732, 1840, 1952, 2068, 2188, 2303, 2431, 2563, 2699, 2809,  // 30-39
                2953  // 40
            ];

            for (let v = 1; v <= 40; v++) {
                if (dataLength <= capacities[v]) {
                    return v;
                }
            }
            return 40; // Maximum
        }

        function truncateText(ctx, text, maxWidth) {
            let width = ctx.measureText(text).width;
            if (width <= maxWidth) return text;

            let truncated = text;
            while (width > maxWidth && truncated.length > 0) {
                truncated = truncated.slice(0, -1);
                width = ctx.measureText(truncated + '...').width;
            }
            return truncated + '...';
        }

        function adjustBrightness(hex, percent) {
            const num = parseInt(hex.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return '#' + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255))
                .toString(16).slice(1);
        }

        function decodeQrFromImage(img) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);

            const statusEl = document.getElementById('importStatus');

            if (code) {
                try {
                    let qrText;

                    // jsQR returns data in code.data as a string
                    // But if it contains UTF-8, we need to handle it carefully
                    if (code.data && code.data.length > 0) {
                        // jsQR may have decoded as Latin-1, so we need to re-encode
                        // and then decode as UTF-8
                        const latin1Encoder = new TextEncoder();
                        const latin1Bytes = latin1Encoder.encode(code.data);

                        // Wait - TextEncoder encodes as UTF-8, not Latin-1!
                        // We need to manually convert: treat each char code as a byte
                        const bytes = new Uint8Array(code.data.length);
                        for (let i = 0; i < code.data.length; i++) {
                            bytes[i] = code.data.charCodeAt(i) & 0xFF;
                        }

                        // Now decode as UTF-8
                        qrText = new TextDecoder('utf-8').decode(bytes);
                    } else if (code.binaryData && code.binaryData.length > 0) {
                        qrText = new TextDecoder('utf-8').decode(new Uint8Array(code.binaryData));
                    } else {
                        throw new Error('No data found in QR code');
                    }

                    console.log('Decoded QR text:', qrText);

                    const data = JSON.parse(qrText);

                    // Validate structure (support both old and compact formats)
                    const isValid = (
                        (data.v === 1 || data.version === 1) &&
                        (data.a === 'qartie' || data.app === 'qartie') &&
                        (data.t === 'l' || data.type === 'list') &&
                        (data.d || data.data)
                    );

                    if (isValid) {
                        const payload = data.d || data.data;
                        pendingImportData = {
                            title: payload.t || payload.title,
                            emoji: payload.e || payload.emoji,
                            color: payload.c || payload.color,
                            items: (payload.i || payload.items || []).map(item => ({
                                text: item.t || item.text,
                                note: item.n || item.note || '',
                                completed: (item.c || item.completed) ? true : false
                            })),
                            created: payload.cr || payload.created || Date.now()
                        };

                        statusEl.textContent = `Found: "${pendingImportData.title}" with ${pendingImportData.items.length} items`;
                        statusEl.className = 'import-status success';
                        document.getElementById('confirmImportBtn').style.display = 'block';
                    } else {
                        throw new Error('Invalid QR code format');
                    }
                } catch (err) {
                    console.error('Import decode error:', err);
                    statusEl.textContent = 'Error: ' + err.message;
                    statusEl.className = 'import-status error';
                    document.getElementById('confirmImportBtn').style.display = 'none';
                }
            } else {
                statusEl.textContent = 'No QR code found in image';
                statusEl.className = 'import-status error';
                document.getElementById('confirmImportBtn').style.display = 'none';
            }
        }

        function decodeQrFromImage(img) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);

            const statusEl = document.getElementById('importStatus');

            if (code) {
                try {
                    let qrText;

                    // Try .data first (jsQR\'s UTF-8 decoded string)
                    if (code.data && code.data.length > 0) {
                        qrText = code.data;
                    }
                    // Fallback to binaryData with proper UTF-8 decoding
                    else if (code.binaryData && code.binaryData.length > 0) {
                        // binaryData is Uint8ClampedArray, convert to Uint8Array then decode
                        const uint8Array = new Uint8Array(code.binaryData);
                        qrText = new TextDecoder('utf-8').decode(uint8Array);
                    } else {
                        throw new Error('No data found in QR code');
                    }

                    console.log('Raw QR text:', qrText);

                    const data = JSON.parse(qrText);

                    // Validate structure (support both old and compact formats)
                    const isValid = (
                        (data.v === 1 || data.version === 1) &&
                        (data.a === 'qartie' || data.app === 'qartie') &&
                        (data.t === 'l' || data.type === 'list') &&
                        (data.d || data.data)
                    );

                    if (isValid) {
                        const payload = data.d || data.data;
                        pendingImportData = {
                            title: payload.t || payload.title,
                            emoji: payload.e || payload.emoji,
                            color: payload.c || payload.color,
                            items: (payload.i || payload.items || []).map(item => ({
                                text: item.t || item.text,
                                note: item.n || item.note || '',
                                completed: (item.c || item.completed) ? true : false
                            })),
                            created: payload.cr || payload.created || Date.now()
                        };

                        statusEl.textContent = `Found: "${pendingImportData.title}" with ${pendingImportData.items.length} items`;
                        statusEl.className = 'import-status success';
                        document.getElementById('confirmImportBtn').style.display = 'block';
                    } else {
                        throw new Error('Invalid QR code format');
                    }
                } catch (err) {
                    console.error('Import decode error:', err);
                    statusEl.textContent = 'Error: ' + err.message;
                    statusEl.className = 'import-status error';
                    document.getElementById('confirmImportBtn').style.display = 'none';
                }
            } else {
                statusEl.textContent = 'No QR code found in image';
                statusEl.className = 'import-status error';
                document.getElementById('confirmImportBtn').style.display = 'none';
            }
        }

        function confirmImport() {
            if (!pendingImportData) return;

            const now = Date.now();
            const listGroupId = crypto.randomUUID();

            const list = {
                listGroupId: listGroupId,
                title: pendingImportData.title,
                emoji: pendingImportData.emoji,
                color: pendingImportData.color,
                created: now,
                deleted: false
            };

            withAdd('lists', list, (e) => {
                const newListId = e.target.result;

                // Add items
                if (pendingImportData.items && pendingImportData.items.length > 0) {
                    let added = 0;
                    pendingImportData.items.forEach(item => {
                        const itemGroupId = crypto.randomUUID();
                        const newItem = {
                            listGroupId: listGroupId,
                            itemGroupId: itemGroupId,
                            text: item.text,
                            note: item.note || '',
                            completed: item.completed || false,
                            created: now,
                            deleted: false
                        };

                        withAdd('items', newItem, () => {
                            added++;
                            if (added === pendingImportData.items.length) {
                                closeImportModal();
                                openList(listGroupId);
                            }
                        });
                    });
                } else {
                    closeImportModal();
                    openList(listGroupId);
                }
            });
        }

        // List Operations
        function saveList() {
            const title = document.getElementById('listTitle').value.trim();
            if (!title) return alert('Please enter a title');

            const now = Date.now();
            const listGroupId = editingListId || crypto.randomUUID();

            const list = {
                listGroupId: listGroupId,
                title,
                emoji: selectedEmoji,
                color: selectedColor,
                created: now,
                deleted: false
            };

            withAdd('lists', list, () => {
                if (editingListId) {
                    closeListModal();
                    openList(listGroupId);
                } else {
                    closeListModal();
                    loadLists();
                }
            });
        }

        function deleteCurrentList() {
            if (!currentListId || !confirm('Delete this list? Items will be soft-deleted too.')) return;

            softDeleteListById(currentListId, () => showMainView());
        }

        function softDeleteListById(listGroupId, onComplete) {
            getLatestByGroupId('lists', 'listGroupId', listGroupId, (currentList) => {
                if (!currentList) return;

                const { id, ...listWithoutId } = currentList;
                const deletedList = {
                    ...listWithoutId,
                    created: Date.now(),
                    deleted: true
                };

                withAdd('lists', deletedList, () => {
                    // Soft-delete all items in this list
                    withGetAll('items', 'listGroupId', listGroupId, (e) => {
                        const items = e.target.result;
                        let pending = 0;

                        items.forEach(item => {
                            if (!item.deleted) {
                                pending++;
                                const { id: itemId, ...itemWithoutId } = item;
                                const deletedItem = {
                                    ...itemWithoutId,
                                    created: Date.now(),
                                    deleted: true
                                };

                                withAdd('items', deletedItem, () => {
                                    pending--;
                                    if (pending === 0 && onComplete) onComplete();
                                });
                            }
                        });

                        if (pending === 0 && onComplete) onComplete();
                    });
                });
            });
        }

        function deleteList(listGroupId) {
            if (!confirm('Delete this list?')) return;
            softDeleteListById(listGroupId, () => loadLists());
        }

        function loadLists() {
            withTransaction(['lists'], 'readonly', (tx) => {
                const store = tx.objectStore('lists');
                const request = store.getAll();

                request.onsuccess = (e) => {
                    const allLists = e.target.result;
                    const listMap = new Map();

                    allLists.forEach(list => {
                        const existing = listMap.get(list.listGroupId);
                        if (!existing || list.created > existing.created) {
                            listMap.set(list.listGroupId, list);
                        }
                    });

                    const lists = Array.from(listMap.values())
                        .filter(l => showDeleted ? true : !l.deleted)
                        .sort((a, b) => b.created - a.created);

                    const container = document.getElementById('listsContainer');
                    const emptyState = document.getElementById('emptyState');

                    if (lists.length === 0) {
                        container.innerHTML = '';
                        emptyState.style.display = 'block';
                        return;
                    }

                    emptyState.style.display = 'none';
                    container.innerHTML = '';
                    lists.forEach(list => container.appendChild(createListCard(list)));
                };

                request.onerror = (e) => console.error('Failed to load lists:', e.target.error);
            });
        }

        function openList(listGroupId) {
            currentListId = listGroupId;

            getLatestByGroupId('lists', 'listGroupId', listGroupId, (list) => {
                if (!list) return showMainView();

                document.getElementById('detailEmoji').textContent = list.emoji;
                document.getElementById('detailTitle').textContent = list.title;
                document.getElementById('detailTitle').style.color = list.color;
                document.getElementById('detailMeta').innerHTML = `
                    Created: ${new Date(list.created).toLocaleString()}<br>
                    Last edited: ${new Date(list.created).toLocaleString()}
                `;

                document.getElementById('mainView').style.display = 'none';
                document.getElementById('listDetail').classList.add('active');

                loadItems();
            });
        }

        function openEditListFromCard(listGroupId) {
            currentListId = listGroupId;
            openEditListModal();
        }

        function showMainView() {
            currentListId = null;
            document.getElementById('mainView').style.display = 'block';
            document.getElementById('listDetail').classList.remove('active');
            loadLists();
        }

        function toggleShowDeleted() {
            showDeleted = !showDeleted;
            document.getElementById('showDeletedBtn').textContent =
                showDeleted ? 'Hide deleted lists' : 'Show deleted lists';
            document.getElementById('showDeletedBtn').classList.toggle('active', showDeleted);
            loadLists();
        }

        // Item Operations
        function loadItems() {
            withGetAll('items', 'listGroupId', currentListId, (e) => {
                const allItems = e.target.result;
                const itemMap = new Map();

                allItems.forEach(item => {
                    const groupId = item.itemGroupId || item.id;
                    const existing = itemMap.get(groupId);
                    if (!existing || item.created > existing.created) {
                        itemMap.set(groupId, item);
                    }
                });

                const items = Array.from(itemMap.values())
                    .filter(i => showDeletedItems ? true : !i.deleted)
                    .sort((a, b) => b.created - a.created);

                const container = document.getElementById('itemsContainer');

                if (items.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>No items yet. Add your first item!</p></div>';
                    return;
                }

                container.innerHTML = '';
                items.forEach(item => container.appendChild(createItemCard(item)));
            });
        }

        function addItem() {
            const text = document.getElementById('itemText').value.trim();
            const note = document.getElementById('itemNote').value.trim();

            if (!text) return;

            const now = Date.now();
            const itemGroupId = crypto.randomUUID();

            const item = {
                listGroupId: currentListId,
                itemGroupId: itemGroupId,
                text,
                note,
                completed: false,
                created: now,
                deleted: false
            };

            withAdd('items', item, () => {
                document.getElementById('itemText').value = '';
                document.getElementById('itemNote').value = '';
                document.getElementById('itemText').focus();
                loadItems();
            });
        }

        function handleItemKeypress(e) {
            if (e.key === 'Enter') addItem();
        }

        function toggleItemComplete(itemId) {
            withGet('items', itemId, (e) => {
                const item = e.target.result;
                const { id, ...itemWithoutId } = item;
                const updatedItem = {
                    ...itemWithoutId,
                    completed: !item.completed,
                    created: Date.now()
                };

                withAdd('items', updatedItem, () => loadItems());
            });
        }

        function openEditItemModal(itemId) {
            editingItemId = itemId;
            withGet('items', itemId, (e) => {
                const item = e.target.result;
                document.getElementById('editItemText').value = item.text;
                document.getElementById('editItemNote').value = item.note || '';
                document.getElementById('itemModal').classList.add('active');
            });
        }

        function saveItem() {
            if (!editingItemId) return;

            const text = document.getElementById('editItemText').value.trim();
            if (!text) return alert('Please enter item text');

            const note = document.getElementById('editItemNote').value.trim();

            withGet('items', editingItemId, (e) => {
                const currentItem = e.target.result;
                const { id, ...itemWithoutId } = currentItem;
                const updatedItem = {
                    ...itemWithoutId,
                    text,
                    note,
                    created: Date.now()
                };

                withAdd('items', updatedItem, () => {
                    closeItemModal();
                    loadItems();
                });
            });
        }

        function softDeleteItem(itemId, onComplete) {
            withGet('items', itemId, (e) => {
                const item = e.target.result;
                const { id, ...itemWithoutId } = item;
                const deletedItem = {
                    ...itemWithoutId,
                    created: Date.now(),
                    deleted: true
                };

                withAdd('items', deletedItem, () => {
                    if (onComplete) onComplete();
                    else loadItems();
                });
            });
        }

        function deleteEditingItem() {
            if (!editingItemId || !confirm('Delete this item?')) return;
            softDeleteItem(editingItemId, () => {
                closeItemModal();
                loadItems();
            });
        }

        function toggleShowDeletedItems() {
            showDeletedItems = !showDeletedItems;
            document.getElementById('showDeletedItemsBtn').textContent =
                showDeletedItems ? 'Hide deleted items' : 'Show deleted items';
            document.getElementById('showDeletedItemsBtn').classList.toggle('active', showDeletedItems);
            loadItems();
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
